name: Linux pysam Verification

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/reference.py'
      - '.github/workflows/test-linux-pysam.yml'
      - 'tests/test_linux_pysam.py'
      - 'requirements.txt'

jobs:
  test-linux:
    name: Verify pysam on Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pysam Verification Test
        run: |
          python tests/test_linux_pysam.py
