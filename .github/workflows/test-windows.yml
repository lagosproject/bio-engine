name: Windows Binary Verification

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/reference.py'
      - 'core/config.py'
      - '.github/workflows/test-windows.yml'
      - 'tests/test_windows_binaries.py'

jobs:
  test-windows:
    name: Verify on Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          while IFS= read -r line || [ -n "$line" ]; do
            line=$(echo "$line" | sed 's/#.*//' | xargs)
            [ -z "$line" ] && continue
            [[ "$line" =~ ^[[:space:]] ]] && continue
            pip install "$line" || echo "WARNING: Failed to install $line (may be platform-specific)"
          done < requirements.txt
          pip install h11 

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          channels: bioconda,conda-forge,defaults
          channel-priority: strict
          show-channel-urls: true

      - name: Install Sidecars via Conda
        shell: bash -el {0}
        run: |
          conda install samtools htslib -y
          
          # Find paths
          SAMTOOLS_PATH=$(which samtools)
          BGZIP_PATH=$(which bgzip)
          echo "Found samtools at: $SAMTOOLS_PATH"
          echo "Found bgzip at: $BGZIP_PATH"
          
          # Ensure they are in Windows PATH format if needed, but 'which' works
          # Just add the directory to GITHUB_PATH
          echo "$(dirname $SAMTOOLS_PATH)" >> $GITHUB_PATH

      - name: Run Windows Binary Test
        shell: bash -el {0}
        env:
          BIO_BGZIP_PATH: bgzip
          BIO_SAMTOOLS_PATH: samtools
          TRACY_PATH: echo
        run: |
          python tests/test_windows_binaries.py
