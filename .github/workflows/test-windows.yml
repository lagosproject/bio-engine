name: Windows Binary Verification

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/reference.py'
      - 'core/config.py'
      - '.github/workflows/test-windows.yml'
      - 'tests/test_windows_binaries.py'

jobs:
  test-windows:
    name: Verify on Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Explicitly install h11 to avoid issues seen in other builds
          pip install h11 

      - name: Download Windows Sidecars (bgzip & samtools)
        shell: pwsh
        run: |
          # Use a reliable source for bgzip/samtools windows binaries
          # Many genomics projects use htslib/samtools from a common distribution or MSYS2
          # For this test, we can use the ones provided by the 'htslib' github releases or similar
          # Or we can just use the ones already available in the runner if any.
          
          # Actually, let's use a specific version known to work
          $SAMTOOLS_VERSION = "1.21"
          $URL = "https://github.com/samtools/samtools/releases/download/$SAMTOOLS_VERSION/samtools-$SAMTOOLS_VERSION-bin.zip"
          
          Write-Host "Downloading samtools/bgzip from $URL"
          Invoke-WebRequest -Uri $URL -OutFile "samtools.zip"
          Expand-Archive -Path "samtools.zip" -DestinationPath "binaries"
          
          # Move them to a convenient location
          # The zip usually contains a folder like samtools-1.21-bin
          $binRoot = Get-ChildItem -Path "binaries" -Directory | Select-Object -First 1
          Copy-Item "$($binRoot.FullName)\*.exe" -Destination "."
          
          Write-Host "Extracted binaries:"
          Get-ChildItem -Filter "*.exe"
          
          # Add current directory to PATH
          $env:PATH = "$(Get-Location)" + [IO.Path]::PathSeparator + $env:PATH
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      - name: Run Windows Binary Test
        env:
          BIO_BGZIP_PATH: bgzip.exe
          BIO_SAMTOOLS_PATH: samtools.exe
          TRACY_PATH: echo "Mocking tracy" # We can mock tracy for this specific test if not needed
        run: |
          python tests/test_windows_binaries.py
