name: Windows Binary Verification

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/reference.py'
      - 'core/config.py'
      - '.github/workflows/test-windows.yml'
      - 'tests/test_windows_binaries.py'

jobs:
  test-windows:
    name: Verify on Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          while IFS= read -r line || [ -n "$line" ]; do
            line=$(echo "$line" | sed 's/#.*//' | xargs)
            [ -z "$line" ] && continue
            [[ "$line" =~ ^[[:space:]] ]] && continue
            pip install "$line" || echo "WARNING: Failed to install $line (may be platform-specific)"
          done < requirements.txt
          pip install h11 

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-samtools mingw-w64-x86_64-htslib

      - name: Run Windows Binary Test
        shell: msys2 {0}
        env:
          BIO_BGZIP_PATH: bgzip
          BIO_SAMTOOLS_PATH: samtools
          TRACY_PATH: echo
        run: |
          # The runner python is usually in PATH, but MSYS2 might need help finding it
          export PATH="/c/hostedtoolcache/windows/Python/3.10.11/x64:$PATH"
          python --version
          python tests/test_windows_binaries.py
