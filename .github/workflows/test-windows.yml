name: Windows Binary Verification

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/reference.py'
      - 'core/config.py'
      - '.github/workflows/test-windows.yml'
      - 'tests/test_windows_binaries.py'

jobs:
  test-windows:
    name: Verify on Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          while IFS= read -r line || [ -n "$line" ]; do
            line=$(echo "$line" | sed 's/#.*//' | xargs)
            [ -z "$line" ] && continue
            [[ "$line" =~ ^[[:space:]] ]] && continue
            pip install "$line" || echo "WARNING: Failed to install $line (may be platform-specific)"
          done < requirements.txt
          pip install h11 

      - name: Install Windows Sidecars (samtools & htslib)
        shell: pwsh
        run: |
          # Install Scoop if not present
          if (!(Get-Command scoop -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
            Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          }
          
          # Install bioinformatics tools
          # Use -f to force if already partially there
          scoop install samtools htslib
          
          # Determine binary locations using absolute Scoop shim path
          $scoopShimDir = Join-Path $env:USERPROFILE "scoop\shims"
          $samtoolsPath = Join-Path $scoopShimDir "samtools.exe"
          $bgzipPath = Join-Path $scoopShimDir "bgzip.exe"
          
          if (Test-Path $samtoolsPath) { Write-Host "Found samtools at: $samtoolsPath" } else { throw "samtools.exe not found in $scoopShimDir" }
          if (Test-Path $bgzipPath) { Write-Host "Found bgzip at: $bgzipPath" } else { throw "bgzip.exe not found in $scoopShimDir" }
          
          # Add current scoop shim dir to PATH
          echo "$scoopShimDir" >> $env:GITHUB_PATH

      - name: Run Windows Binary Test
        env:
          BIO_BGZIP_PATH: bgzip.exe
          BIO_SAMTOOLS_PATH: samtools.exe
          TRACY_PATH: echo "Mocking tracy" # We can mock tracy for this specific test if not needed
        run: |
          python tests/test_windows_binaries.py
